<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brainstorm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // FORCE UNREGISTER SERVICE WORKER to clear stale cache
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          console.log('Unregistering Service Worker:', registration);
          registration.unregister();
        }
      });
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Bebas+Neue&family=Caveat:wght@400;700&family=Comic+Neue:wght@400;700&family=Dancing+Script:wght@400;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Manrope:wght@200;300;400;500;600;700;800&family=Merriweather:wght@300;400;700&family=Patrick+Hand&family=Playfair+Display:wght@400;700&family=Roboto+Slab:wght@300;400;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Manrope"', 'sans-serif'],
            display: ['"Manrope"', 'sans-serif'],
            cursive: ['"Patrick Hand"', 'cursive'],
            // New Fonts
            inter: ['"Inter"', 'sans-serif'],
            serif: ['"Merriweather"', 'serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
            hand: ['"Caveat"', 'cursive'],
            playfair: ['"Playfair Display"', 'serif'],
            slab: ['"Roboto Slab"', 'serif'],
            bebas: ['"Bebas Neue"', 'sans-serif'],
            comic: ['"Comic Neue"', 'cursive'],
          },
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              900: '#0c4a6e',
            }
          },
          backgroundImage: {
            'dot-pattern': 'radial-gradient(#cbd5e1 1px, transparent 1px)',
            'grid-pattern': 'linear-gradient(to right, #f1f5f9 1px, transparent 1px), linear-gradient(to bottom, #f1f5f9 1px, transparent 1px)',
          },
          animation: {
            'blob': 'blob 10s infinite',
            'float': 'float 6s ease-in-out infinite',
            'float-delayed': 'float 6s ease-in-out 3s infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            glow: {
              '0%': { boxShadow: '0 0 5px rgba(139, 92, 246, 0.5)' },
              '100%': { boxShadow: '0 0 20px rgba(139, 92, 246, 0.8), 0 0 10px rgba(139, 92, 246, 0.6)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Ensure min-height instead of fixed height to allow scrolling */
    body,
    html {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background-color: #fafafa;
      font-family: 'Manrope', sans-serif;
      color: #0f172a;
      overflow-x: hidden;
    }

    /* Custom scrollbar hide for cleaner canvas look */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @media print {
      body * {
        visibility: hidden;
      }

      #summary-content,
      #summary-content * {
        visibility: visible;
      }

      #summary-content {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.89.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
